name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Local validation parity (`make validate`)
        run: |
          make validate
      - name: CLI smoke parity (`make cli-help`, `make compare-lab01`)
        run: |
          make cli-help
          make compare-lab01
